<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Segnalazione Intervento — Comune di Genova</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      padding: 2rem 1rem;
    }
    .container {
      max-width: 680px;
      margin: 0 auto;
    }
    .header {
      background: #003f7f;
      color: white;
      padding: 1.5rem 2rem;
      border-radius: 12px 12px 0 0;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .header-logo {
      font-size: 2rem;
    }
    .header h1 {
      font-size: 1.2rem;
      font-weight: 600;
    }
    .header p {
      font-size: 0.85rem;
      opacity: 0.8;
      margin-top: 0.2rem;
    }
    .card {
      background: white;
      border-radius: 0 0 12px 12px;
      padding: 2rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    .urgenza-bar {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }
    .urgenza-btn {
      flex: 1;
      padding: 0.75rem;
      border: 2px solid #ddd;
      border-radius: 8px;
      cursor: pointer;
      text-align: center;
      font-size: 0.9rem;
      font-weight: 500;
      transition: all 0.2s;
      background: white;
    }
    .urgenza-btn.normale.active {
      border-color: #f59e0b;
      background: #fffbeb;
      color: #92400e;
    }
    .urgenza-btn.urgente.active {
      border-color: #ef4444;
      background: #fef2f2;
      color: #991b1b;
    }
    .field {
      margin-bottom: 1.25rem;
    }
    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 0.4rem;
    }
    label .req { color: #ef4444; margin-left: 2px; }
    select, input, textarea {
      width: 100%;
      padding: 0.65rem 0.85rem;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
      transition: border-color 0.2s;
      background: white;
    }
    select:focus, input:focus, textarea:focus {
      outline: none;
      border-color: #003f7f;
    }
    textarea { resize: vertical; min-height: 90px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .divider {
      border: none;
      border-top: 1px solid #e5e7eb;
      margin: 1.5rem 0;
    }
    .section-title {
      font-size: 0.75rem;
      font-weight: 700;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 1rem;
    }
    .btn-submit {
      width: 100%;
      padding: 0.9rem;
      background: #003f7f;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 0.5rem;
    }
    .btn-submit:hover { background: #002d5c; }
    .btn-submit:disabled { background: #9ca3af; cursor: not-allowed; }
    .success {
      display: none;
      background: #dcfce7;
      border: 1.5px solid #16a34a;
      color: #15803d;
      padding: 1.25rem;
      border-radius: 8px;
      text-align: center;
      margin-top: 1rem;
    }
    .success h3 { margin-bottom: 0.5rem; }
    .error-msg {
      display: none;
      background: #fef2f2;
      border: 1.5px solid #ef4444;
      color: #991b1b;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      margin-top: 0.75rem;
      font-size: 0.9rem;
    }
    .loading { display: none; }
    @media (max-width: 500px) {
      .row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-logo">🏛️</div>
    <div>
      <h1>Richiesta di Intervento Ausili</h1>
      <p>Comune di Genova — Direzione Servizi Educativi</p>
    </div>
  </div>
  <div class="card">

    <!-- Urgenza -->
    <div class="field">
      <label>Priorità intervento <span class="req">*</span></label>
      <div class="urgenza-bar">
        <button type="button" class="urgenza-btn normale active" onclick="setUrgenza(false)">
          🟡 Normale <small>(entro 48 ore)</small>
        </button>
        <button type="button" class="urgenza-btn urgente" onclick="setUrgenza(true)">
          🔴 Urgente <small>(entro 24 ore)</small>
        </button>
      </div>
    </div>

    <!-- Tipo intervento -->
    <div class="field">
      <label for="tipo">Tipo di intervento <span class="req">*</span></label>
      <select id="tipo" required>
        <option value="">— Seleziona il tipo —</option>
        <option>Manutenzione straordinaria</option>
        <option>Manutenzione ordinaria</option>
        <option>Trasporto / Spostamento</option>
        <option>Pulizia e disinfezione</option>
        <option>Consulenza tecnica</option>
        <option>Rottamazione</option>
      </select>
    </div>

    <!-- Scuola -->
    <div class="field">
      <label for="scuola">Scuola / Sede <span class="req">*</span></label>
      <select id="scuola" required onchange="loadAusili()">
        <option value="">— Seleziona la sede —</option>
      </select>
    </div>

    <!-- Ausilio -->
    <div class="field">
      <label for="ausilio">Ausilio interessato</label>
      <select id="ausilio">
        <option value="">— Seleziona prima la scuola —</option>
      </select>
    </div>

    <!-- Note -->
    <div class="field">
      <label for="note">Descrizione / Note aggiuntive</label>
      <textarea id="note" placeholder="Descriva il problema o eventuali dettagli utili per l'intervento..."></textarea>
    </div>

    <hr class="divider">
    <div class="section-title">Dati del funzionario</div>

    <div class="row">
      <div class="field">
        <label for="nome_funzionario">Nome e cognome <span class="req">*</span></label>
        <input type="text" id="nome_funzionario" placeholder="Es. Mario Rossi" required>
      </div>
      <div class="field">
        <label for="email_funzionario">Email <span class="req">*</span></label>
        <input type="email" id="email_funzionario" placeholder="nome@comune.genova.it" required>
      </div>
    </div>

    <button class="btn-submit" onclick="inviaSegnalazione()">
      📨 Invia Richiesta di Intervento
    </button>

    <div class="error-msg" id="errore"></div>

    <div class="success" id="successo">
      <h3>✅ Richiesta inviata con successo!</h3>
      <p>La sua segnalazione è stata registrata. Il team interverrà entro <strong id="tempi-risposta">48 ore</strong>.</p>
      <p style="margin-top:0.5rem; font-size:0.85rem; color:#166534;">Una conferma è stata inviata al suo indirizzo email.</p>
      <button onclick="nuovaSegnalazione()" style="margin-top:1rem; padding:0.5rem 1.5rem; background:#16a34a; color:white; border:none; border-radius:6px; cursor:pointer; font-size:0.9rem;">
        Nuova segnalazione
      </button>
    </div>

  </div>
</div>

<script>
let urgente = false;

function setUrgenza(val) {
  urgente = val;
  document.querySelectorAll('.urgenza-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(val ? '.urgente' : '.normale').classList.add('active');
}

async function loadScuole() {
  const res = await fetch('/api/ausili/meta/scuole');
  const scuole = await res.json();
  const sel = document.getElementById('scuola');
  scuole
    .filter(s => s.nome !== 'Magazzino')
    .forEach(s => {
      const opt = document.createElement('option');
      opt.value = s.nome;
      opt.textContent = s.nome;
      sel.appendChild(opt);
    });
}

async function loadAusili() {
  const scuola = document.getElementById('scuola').value;
  const sel = document.getElementById('ausilio');
  sel.innerHTML = '<option value="">— Caricamento... —</option>';
  if (!scuola) {
    sel.innerHTML = '<option value="">— Seleziona prima la scuola —</option>';
    return;
  }
  const res = await fetch('/api/ausili/per-scuola/' + encodeURIComponent(scuola));
  const ausili = await res.json();
  sel.innerHTML = '<option value="">— Ausilio non specificato —</option>';
  ausili.forEach(a => {
    const opt = document.createElement('option');
    opt.value = a.id;
    opt.textContent = '[' + a.inv_id + '] ' + a.nome;
    opt.dataset.nome = a.nome;
    sel.appendChild(opt);
  });
  if (ausili.length === 0) {
    sel.innerHTML = '<option value="">— Nessun ausilio registrato in questa sede —</option>';
  }
}

async function inviaSegnalazione() {
  const tipo = document.getElementById('tipo').value;
  const scuola = document.getElementById('scuola').value;
  const ausilioSel = document.getElementById('ausilio');
  const ausilio_id = ausilioSel.value || null;
  const ausilio_nome = ausilio_id ? ausilioSel.options[ausilioSel.selectedIndex].dataset.nome : null;
  const note = document.getElementById('note').value.trim();
  const nome_funzionario = document.getElementById('nome_funzionario').value.trim();
  const email_funzionario = document.getElementById('email_funzionario').value.trim();

  // Validazione
  const errore = document.getElementById('errore');
  errore.style.display = 'none';

  if (!tipo) return showError('Seleziona il tipo di intervento.');
  if (!scuola) return showError('Seleziona la scuola.');
  if (!nome_funzionario) return showError('Inserisci il tuo nome e cognome.');
  if (!email_funzionario || !email_funzionario.includes('@')) return showError('Inserisci un indirizzo email valido.');

  const btn = document.querySelector('.btn-submit');
  btn.disabled = true;
  btn.textContent = '⏳ Invio in corso...';

  try {
    const res = await fetch('/api/segnalazioni', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tipo, urgente, scuola, ausilio_id, ausilio_nome, note, nome_funzionario, email_funzionario }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Errore server');

    document.getElementById('tempi-risposta').textContent = urgente ? '24 ore' : '48 ore';
    document.getElementById('successo').style.display = 'block';
    btn.style.display = 'none';
  } catch (err) {
    showError('Errore durante l\'invio: ' + err.message);
    btn.disabled = false;
    btn.textContent = '📨 Invia Richiesta di Intervento';
  }
}

function showError(msg) {
  const el = document.getElementById('errore');
  el.textContent = msg;
  el.style.display = 'block';
}

function nuovaSegnalazione() {
  location.reload();
}

loadScuole();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Segnalazioni — Kabel S.r.l.</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--blu:#1a3a5c;--blu2:#2563a8;--oro:#e8a020;--bg:#f4f6f9;--testo:#1e2d3d;--grigio:#6b7a8d;--bordo:#dde3ea}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--testo)}
    .navbar{background:var(--blu);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:64px;box-shadow:0 2px 12px rgba(0,0,0,.15)}
    .nb{display:flex;align-items:center;gap:.75rem}
    .logo{width:36px;height:36px;background:var(--oro);color:var(--blu);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:1.2rem;font-weight:700}
    .bn{color:#fff;font-weight:600;font-size:.95rem;display:block}
    .bs{color:rgba(255,255,255,.55);font-size:.72rem;display:block}
    .nl{display:flex;gap:.25rem}
    .nl a{display:flex;align-items:center;gap:.4rem;padding:.5rem 1.2rem;color:rgba(255,255,255,.7);text-decoration:none;border-radius:7px;font-size:.9rem;font-weight:500;transition:all .2s}
    .nl a:hover{background:rgba(255,255,255,.1);color:#fff}
    .nl a.active{background:var(--oro);color:var(--blu);font-weight:600}
    .wrap{max-width:720px;margin:2rem auto;padding:0 1rem}
    .ptitle{font-family:'DM Serif Display',serif;font-size:1.6rem;color:var(--blu);margin-bottom:.3rem}
    .psub{color:var(--grigio);font-size:.88rem;margin-bottom:1.5rem}
    .card{background:#fff;border-radius:12px;padding:2rem;box-shadow:0 2px 12px rgba(0,0,0,.06)}
    .urgbar{display:flex;gap:.75rem;margin-bottom:1.5rem}
    .ubtn{flex:1;padding:.75rem;border:2px solid var(--bordo);border-radius:8px;cursor:pointer;text-align:center;font-size:.88rem;font-weight:500;transition:all .2s;background:#fff;font-family:'DM Sans',sans-serif}
    .ubtn.normale.active{border-color:#f59e0b;background:#fffbeb;color:#92400e}
    .ubtn.urgente.active{border-color:#ef4444;background:#fef2f2;color:#991b1b}
    .field{margin-bottom:1.25rem}
    label{display:block;font-size:.8rem;font-weight:600;color:var(--grigio);margin-bottom:.4rem;text-transform:uppercase;letter-spacing:.04em}
    label .req{color:#ef4444}
    select,input,textarea{width:100%;padding:.65rem .85rem;border:1.5px solid var(--bordo);border-radius:8px;font-size:.95rem;font-family:'DM Sans',sans-serif;transition:border-color .2s;background:#fff;color:var(--testo)}
    select:focus,input:focus,textarea:focus{outline:none;border-color:var(--blu2)}
    textarea{resize:vertical;min-height:90px}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
    .div{border:none;border-top:1px solid var(--bordo);margin:1.5rem 0}
    .stitle{font-size:.72rem;font-weight:700;color:var(--grigio);text-transform:uppercase;letter-spacing:.06em;margin-bottom:1rem}
    .btnsubmit{width:100%;padding:.9rem;background:var(--blu);color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;transition:background .2s;font-family:'DM Sans',sans-serif;margin-top:.5rem}
    .btnsubmit:hover{background:var(--blu2)}
    .btnsubmit:disabled{background:#9ca3af;cursor:not-allowed}
    .success{display:none;background:#dcfce7;border:1.5px solid #16a34a;color:#15803d;padding:1.25rem;border-radius:8px;text-align:center;margin-top:1rem}
    .errmsg{display:none;background:#fef2f2;border:1.5px solid #ef4444;color:#991b1b;padding:.75rem 1rem;border-radius:8px;margin-top:.75rem;font-size:.9rem}
    @media(max-width:500px){.row{grid-template-columns:1fr}}
  </style>
</head>
<body>
<nav class="navbar">
  <div class="nb">
    <div class="logo">K</div>
    <div><span class="bn">Kabel S.r.l.</span><span class="bs">Gestione Ausili — Comune di Genova</span></div>
  </div>
  <div class="nl">
    <a href="/pages/segnala.html" class="active">📨 Segnalazioni</a>
    <a href="/pages/admin.html">⚙️ Gestione</a>
  </div>
</nav>
<div class="wrap">
  <h1 class="ptitle">Richiesta di Intervento</h1>
  <p class="psub">Compila il modulo per inviare una segnalazione al team Kabel S.r.l.</p>
  <div class="card">
    <div class="field">
      <label>Priorità <span class="req">*</span></label>
      <div class="urgbar">
        <button type="button" class="ubtn normale active" onclick="setUrgenza(false)">🟡 Normale <small>(48h)</small></button>
        <button type="button" class="ubtn urgente" onclick="setUrgenza(true)">🔴 Urgente <small>(24h)</small></button>
      </div>
    </div>
    <div class="field"><label for="tipo">Tipo di intervento <span class="req">*</span></label>
      <select id="tipo"><option value="">— Seleziona —</option><option>Manutenzione straordinaria</option><option>Manutenzione ordinaria</option><option>Trasporto / Spostamento</option><option>Pulizia e disinfezione</option><option>Consulenza tecnica</option><option>Rottamazione</option></select>
    </div>
    <div class="field"><label for="scuola">Scuola / Sede <span class="req">*</span></label>
      <select id="scuola" onchange="loadAusili()"><option value="">— Seleziona la sede —</option></select>
    </div>
    <div class="field"><label for="ausilio">Ausilio interessato</label>
      <select id="ausilio"><option value="">— Seleziona prima la scuola —</option></select>
    </div>
    <div class="field"><label for="note">Note aggiuntive</label>
      <textarea id="note" placeholder="Descriva il problema o eventuali dettagli utili..."></textarea>
    </div>
    <hr class="div">
    <div class="stitle">Dati del funzionario</div>
    <div class="row">
      <div class="field"><label for="nome">Nome e cognome <span class="req">*</span></label><input type="text" id="nome" placeholder="Es. Mario Rossi"></div>
      <div class="field"><label for="email">Email <span class="req">*</span></label><input type="email" id="email" placeholder="nome@comune.genova.it"></div>
    </div>
    <button class="btnsubmit" onclick="invia()">📨 Invia Richiesta di Intervento</button>
    <div class="errmsg" id="err"></div>
    <div class="success" id="ok">
      <h3>✅ Richiesta inviata!</h3>
      <p>Il team Kabel interverrà entro <strong id="tempi">48 ore</strong>.</p>
      <button onclick="location.reload()" style="margin-top:1rem;padding:.5rem 1.5rem;background:#16a34a;color:#fff;border:none;border-radius:6px;cursor:pointer;font-family:'DM Sans',sans-serif">Nuova segnalazione</button>
    </div>
  </div>
</div>
<script>
let urgente=false;
function setUrgenza(v){urgente=v;document.querySelectorAll('.ubtn').forEach(b=>b.classList.remove('active'));document.querySelector(v?'.urgente':'.normale').classList.add('active')}
async function loadScuole(){const r=await fetch('/api/ausili/meta/scuole');const s=await r.json();const sel=document.getElementById('scuola');s.filter(x=>x.nome!=='Magazzino').forEach(x=>{const o=document.createElement('option');o.value=x.nome;o.textContent=x.nome;sel.appendChild(o)})}
async function loadAusili(){const sc=document.getElementById('scuola').value;const sel=document.getElementById('ausilio');sel.innerHTML='<option>— Caricamento... —</option>';if(!sc){sel.innerHTML='<option>— Seleziona prima la scuola —</option>';return}const r=await fetch('/api/ausili/per-scuola/'+encodeURIComponent(sc));const a=await r.json();sel.innerHTML='<option value="">— Ausilio non specificato —</option>';a.forEach(x=>{const o=document.createElement('option');o.value=x.id;o.textContent='['+x.inv_id+'] '+x.nome;o.dataset.nome=x.nome;sel.appendChild(o)});if(a.length===0)sel.innerHTML='<option>— Nessun ausilio in questa sede —</option>'}
async function invia(){const tipo=document.getElementById('tipo').value;const scuola=document.getElementById('scuola').value;const asel=document.getElementById('ausilio');const ausilio_id=asel.value||null;const ausilio_nome=ausilio_id?asel.options[asel.selectedIndex].dataset.nome:null;const note=document.getElementById('note').value.trim();const nome_funzionario=document.getElementById('nome').value.trim();const email_funzionario=document.getElementById('email').value.trim();const err=document.getElementById('err');err.style.display='none';if(!tipo)return showErr('Seleziona il tipo di intervento.');if(!scuola)return showErr('Seleziona la scuola.');if(!nome_funzionario)return showErr('Inserisci nome e cognome.');if(!email_funzionario||!email_funzionario.includes('@'))return showErr('Email non valida.');const btn=document.querySelector('.btnsubmit');btn.disabled=true;btn.textContent='⏳ Invio...';try{const r=await fetch('/api/segnalazioni',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({tipo,urgente,scuola,ausilio_id,ausilio_nome,note,nome_funzionario,email_funzionario})});const d=await r.json();if(!r.ok)throw new Error(d.error||'Errore');document.getElementById('tempi').textContent=urgente?'24 ore':'48 ore';document.getElementById('ok').style.display='block';btn.style.display='none'}catch(e){showErr('Errore: '+e.message);btn.disabled=false;btn.textContent='📨 Invia Richiesta'}}
function showErr(m){const e=document.getElementById('err');e.textContent=m;e.style.display='block'}
loadScuole();
</script>
</body>
</html>
